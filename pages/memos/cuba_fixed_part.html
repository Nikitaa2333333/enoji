<!DOCTYPE html>
<html class="light" lang="ru">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Памятка: Памятка туриста Куба — Emoji Tours</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="../../scripts/pdf-download.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#fffcf5",
            "surface": "#fffcf5",
            "on-surface": "#000000",
            "primary": "#f5e2a1",
            "on-primary": "#000000",
            "on-surface-variant": "#000000",
            "surface-container-low": "#fffcf5",
            "surface-container-high": "#fffaf0",
            "primary-container": "#f5e2a1",
            "on-primary-container": "#000000",
          },
          fontFamily: { "headline": ["Manrope"], "body": ["Manrope"] },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      opacity: 1 !important;
    }

    a {
      text-decoration: none !important;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 110px;
    }

    p {
      line-height: 1.8;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* Навигация */
    #quick-links {
      max-height: calc(100vh - 220px);
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #quick-links::-webkit-scrollbar {
      display: none;
    }

    .nav-link {
      display: block;
      padding: 0.5rem 1.5rem;
      border-left: 2px solid transparent;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.4;
      color: #000000;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: #000;
      background: rgba(0, 0, 0, 0.02);
    }

    .nav-link.active {
      color: #000;
      font-weight: 700;
      border-left-color: #f5e2a1;
      background: rgba(245, 226, 161, 0.2);
    }

    .nav-category {
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
      font-size: 13px;
      font-weight: 800;
      color: rgba(0, 0, 0, 0.4);
    }

    .nav-group {
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      padding-bottom: 1rem;
    }

    /* Красивые списки с желтыми галочками */
    .check-list {
      list-style-type: none !important;
      padding-left: 0 !important;
      margin: 1.5rem 0 !important;
    }

    .check-list li {
      position: relative;
      padding-left: 2.2rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .check-list li::before {
      content: 'check_circle';
      font-family: 'Material Symbols Outlined';
      position: absolute;
      left: 0;
      top: 0.1rem;
      color: #f5e2a1;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 1.4rem;
    }

    /* Таблицы */
    .table-container {
      overflow-x: auto;
      margin: 2.5rem 0;
      background: rgba(0, 0, 0, 0.02);
      padding: 1.5rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .table-container table {
      width: 100%;
      border-collapse: collapse;
    }

    .table-container td {
      padding: 1rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      font-size: 1rem;
    }

    .table-container tr:last-child td {
      border-bottom: none;
    }

    .table-container td:first-child {
      font-weight: 800;
      color: #000;
      width: 35%;
    }
  </style>
</head>

<body class="bg-background text-on-surface">

  <!-- ШАПКА -->
  <nav class="fixed top-0 w-full z-50 bg-[#fffcf5]/90 backdrop-blur-md border-b border-black/5 py-4">
    <div class="max-w-7xl mx-auto flex justify-between md:justify-center items-center px-4 md:px-8 relative">
      <a href="../../index.html"
        class="flex md:absolute md:left-8 text-xs md:text-sm font-bold items-center gap-1 md:gap-2 hover:opacity-70 transition-opacity whitespace-nowrap bg-black/5 px-3 py-2 rounded-full md:bg-transparent">
        <span class="material-symbols-outlined text-[18px] md:text-[24px]">arrow_back</span>
        Все страны
      </a>
      <a href="../../index.html" class="flex-shrink-0 mx-auto md:mx-0">
        <img src="../../images/logo.png" alt="Emoji Tours" class="h-8 md:h-10"
          onerror="this.src='https://via.placeholder.com/150?text=Emoji+Tours'">
      </a>
    </div>
  </nav>

  <!-- Кнопка навигации мобильная (Floating) -->
  <button onclick="toggleMenu()"
    class="md:hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[90] flex items-center gap-2 bg-black text-white px-6 py-4 rounded-full font-bold shadow-2xl active:scale-95 transition-all">
    <span class="material-symbols-outlined text-[20px]">menu</span>
    Содержание
  </button>
