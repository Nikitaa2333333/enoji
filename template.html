<!DOCTYPE html>
<html class="light" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>██Название страны██ — Emoji Tours</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background":              "#fffcf5",
                        "surface":                 "#fffcf5",
                        "on-surface":              "#000000",
                        "primary":                 "#f5e2a1",
                        "on-primary":              "#000000",
                        "on-surface-variant":      "#4b4b4b",
                        "surface-container-low":   "#fffcf5",
                        "surface-container-high":  "#fffaf0",
                        "primary-container":       "#f5e2a1",
                        "on-primary-container":    "#000000",
                    },
                    fontFamily: { "headline": ["Manrope"], "body": ["Manrope"] },
                },
            },
        }
    </script>
    <style>
        body  { font-family: 'Manrope', sans-serif; }
        a     { text-decoration: none !important; }
        html  { scroll-behavior: smooth; }
        p     { line-height: 1.8; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        
        /* Стили навигации как в Google Docs */
        /* Исправление для содержания */
        #quick-links {
            max-height: calc(100vh - 220px); /* Ограничиваем высоту */
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #quick-links::-webkit-scrollbar {
            display: none;
        }

        .nav-link {
            display: block;
            padding: 0.6rem 1.5rem;
            border-left: 2px solid transparent;
            font-size: 0.85rem;
            line-height: 1.3;
            color: #4b4b4b;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: #000;
            background: rgba(245, 226, 161, 0.1);
        }

        .nav-link.active {
            color: #000;
            font-weight: 700;
            border-left-color: #f5e2a1;
            background: rgba(245, 226, 161, 0.2);
        }
    </style>
</head>

<body class="bg-background text-on-surface">

    <!-- ═══ ФИКСИРОВАННАЯ ШАПКА ═══ -->
    <nav class="fixed top-0 w-full z-50 bg-[#fffcf5]/80 backdrop-blur-md border-b border-black/5 py-4">
        <div class="max-w-7xl mx-auto flex justify-center items-center px-8 relative">
            <a href="index.html" class="absolute left-8 text-sm font-bold flex items-center gap-2 hover:opacity-70 transition-opacity">
                <span class="material-symbols-outlined">arrow_back</span>
                Все страны
            </a>
            <a href="index.html">
                <img src="LogoB_300x.png" alt="Emoji Tours" class="h-10">
            </a>
        </div>
    </nav>

    <main>
        <!-- ═══ HERO PHOTO (100VH) ═══ -->
        <section class="relative h-screen w-full overflow-hidden">
            <img src="██hero.jpg██" class="w-full h-full object-cover" id="hero-image">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/20"></div>
        </section>

        <!-- ═══ LAYOUT WITH SIDEBAR ═══ -->
        <div class="max-w-7xl mx-auto px-8 relative flex flex-col lg:flex-row gap-12">
            
            <!-- ═══ SIDEBAR NAVIGATION (LEFT, STICKY) ═══ -->
            <aside class="hidden lg:block w-64 pt-20">
                <div class="sticky top-24 h-fit max-h-screen pb-10">
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-black/40 mb-6 px-6">Содержание</p>       
                        <nav id="quick-links" class="flex flex-col border-l border-black/5">
                             <!-- Сюда вставим ссылки скриптом -->
                        </nav>
                    </div>
                </div>
            </aside>

            <!-- ═══ CONTENT AREA ═══ -->
            <div class="flex-1 py-20">
                <p class="text-primary font-bold tracking-widest uppercase text-xs mb-2">Направление</p>
                <h1 id="page-title" class="text-7xl md:text-9xl font-black tracking-tighter leading-none mb-12">██Название██</h1>
                
                <div class="flex flex-wrap gap-4 mb-24">
                    <a href="#booking-form" class="inline-block bg-primary text-black px-10 py-4 rounded-full text-lg font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">Хочу туда</a>
                    <a href="memo-██slug██.html" class="inline-block bg-black text-white px-10 py-4 rounded-full text-lg font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">Памятка туристу</a>
                </div>

                <div class="space-y-32" id="memo-content-area">
                     <!-- Контент здесь -->
                </div>
            </div>
        </div>

        <!-- ═══ ФОРМА (ШАБЛОН) ═══ -->
        <section id="booking-form" class="py-32 px-8 bg-surface-container-high relative overflow-hidden">
            <div class="absolute top-0 right-0 w-1/3 h-full bg-primary-container/10 -skew-x-12 transform translate-x-1/2 -z-0"></div>
            <div class="max-w-4xl mx-auto relative z-10">
                <div class="text-center mb-16 space-y-4">
                    <h2 class="text-5xl font-headline font-extrabold text-on-surface">Заполните анкету</h2>
                    <p class="text-on-surface-variant text-lg font-light">Мы подберем идеальный тур, исходя из ваших желаний и эмоционального настроя.</p>
                </div>
                <form class="bg-surface rounded-3xl p-10 md:p-16 shadow-2xl space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-on-surface-variant ml-1">Имя и Фамилия</label>
                            <input class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary transition-all" placeholder="Иван Иванов" type="text"/>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-on-surface-variant ml-1">E-mail</label>
                            <input class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary transition-all" placeholder="hello@example.com" type="email"/>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-on-surface-variant ml-1">Телефон</label>
                            <input class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary transition-all" placeholder="+7 (___) ___-__-__" type="tel"/>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-on-surface-variant ml-1">Направление</label>
                            <input class="w-full bg-surface-container-low border-none rounded-lg p-4 focus:ring-2 focus:ring-primary transition-all" value="██Страна██" type="text"/>
                        </div>
                    </div>
                    <div class="pt-8 flex justify-center">
                        <button class="bg-primary text-on-primary px-12 py-5 rounded-full text-xl font-bold shadow-2xl hover:scale-105 active:scale-95 transition-all" type="submit">Отправить заявку на мечту</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="bg-[#fffcf5] w-full border-t border-black/10 pt-20 pb-12 px-8">
        <div class="max-w-7xl mx-auto flex flex-col gap-12">
            <div class="flex flex-col md:flex-row justify-between items-start gap-12">
                <div class="space-y-6 max-w-sm">
                    <img src="LogoB_300x.png" alt="Emoji Tours" class="h-16">
                    <div class="text-black/60 font-['Manrope'] text-sm leading-relaxed">
                        © 2024 Emoji Tours. Путешествия с душой.
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Плавный скролл для навигации
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({
                        top: target.offsetTop - 120,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // ScrollSpy: подсветка активного пункта в меню при скролле
        const sections = document.querySelectorAll('h2[id]');
        const navLinks = document.querySelectorAll('.nav-link');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= (sectionTop - 150)) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === "#" + current) {
                    link.classList.add('active');
                    
                    const parent = document.getElementById('quick-links');
                    if (parent) {
                        const linkTop = link.offsetTop;
                        const parentHeight = parent.offsetHeight;
                        const parentScroll = parent.scrollTop;
                        
                        if (linkTop > (parentScroll + parentHeight - 50) || linkTop < parentScroll) {
                            parent.scrollTo({
                                top: linkTop - 100,
                                behavior: 'smooth'
                            });
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
